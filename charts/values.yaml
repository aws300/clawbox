global:
  wildcardHost: example.com
  gateway: eg
  gatewayNamespace: aws300
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80


clawbox:
  enabled: false
  # webtopToken: 设置后将作为 SELKIES_MASTER_TOKEN 启用 URL token 认证
  # 访问方式: https://<host>/?token=<webtopToken>
  # 留空或不设置则不启用认证（Selkies 默认行为）
  webtopToken: ""
  # irsaRoleArn: IAM role ARN for IRSA (pod-level AWS credentials via ServiceAccount)
  # The role must have Bedrock permissions: bedrock:InvokeModel, bedrock:InvokeModelWithResponseStream
  # Example: arn:aws:iam::123456789012:role/ClawboxBedrockRole
  irsaRoleArn: ""

  # feishu: Feishu (Lark) channel credentials injected into openclaw.json ConfigMap.
  # Only used when customConfig.enbled is false (the default).
  feishu:
    appId: ""
    appSecret: ""
    encryptKey: ""
    verificationToken: ""

  # customConfig: Override the entire openclaw.json with a user-supplied JSON string.
  # When enabled: true, the feishu keys above are ignored and the ConfigMap is populated
  # entirely from customConfig.json instead.
  # Usage example in your values override file:
  #   clawbox:
  #     customConfig:
  #       enabled: true
  #       json: |
  #         { "channels": { "feishu": { ... } }, ... }
  customConfig:
    enabled: false
    json: ""